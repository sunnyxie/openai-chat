name: CI — Build, Test & Docker

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: openai-chat-api

jobs:
  # ── Job 1: Build & unit-test ────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore OpenAiChat.sln

      - name: Build
        run: dotnet build OpenAiChat.sln --no-restore --configuration Release

      - name: Run unit tests
        # The OPENAI_API_KEY is intentionally NOT provided here.
        # Unit tests use a mock IChatService and never call the real API.
        run: dotnet test OpenAiChat.sln --no-build --configuration Release --verbosity normal

  # ── Job 2: Docker build (verify image builds cleanly) ───────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Optional: push to GitHub Container Registry on main branch
      # Uncomment and set GITHUB_TOKEN (automatically available) if desired.
