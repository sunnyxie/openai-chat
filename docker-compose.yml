version: "3.9"

services:
  openai-chat-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: openai-chat-api:latest
    container_name: openai-chat-api
    ports:
      - "5000:8080"
    environment:
      # Inject your key here or export OPENAI_API_KEY in the shell before running
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASPNETCORE_ENVIRONMENT=Production
      # Override the model without rebuilding:
      # - OpenAI__ModelName=gpt-4o
    restart: unless-stopped
